# Cloudflare Workers deployment config.
# The server bundle is built by Vite + TanStack Start (see vite.config.ts).
# This file declares the cron schedule that triggers background workers via
# /api/internal/run-workers (see src/server.ts and src/lib/workers/).

name = "venom-router"
compatibility_date = "2024-09-23"

[triggers]
crons = ["*/5 * * * *"]
